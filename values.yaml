# Docker Hub username already filled in (savirod211).
# Still worth double-checking before installing:
#   1. mongodb.externalIp - your mongodb-db VM's actual IP
#   2. postgres.password / mongodb credentials - match your actual setup

frontend:
  image:
    repository: savirod211/frontend-employee
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    port: 3000
  env:
    backendUrl: http://backend-employee:8080

backend:
  image:
    repository: savirod211/backend-employee
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    port: 8080
  env:
    datasourceUrl: jdbc:postgresql://postgres:5432/employeedb
    mongodbUri: mongodb://app_reader:changeme@mongodb:27017/activitydb?authSource=activitydb

# PostgreSQL - now an in-cluster container (StatefulSet + PVC), backed by
# local-path-provisioner. Moved here from an external VM.
postgres:
  database: employeedb
  username: employee_app
  password: changeme
  port: 5432
  storageClassName: local-path
  storageSize: 1Gi

# MongoDB - stays an external VM on purpose (blast-radius separation).
# Not yet a container; this Service + Endpoints pair points at that VM.
mongodb:
  externalIp: 203.0.113.20   # <-- your mongodb-db VM's real IP
  port: 27017
